<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kaeru</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@100;200;300;400;500;600;700&family=Open+Sans:wght@300;400;500;600;700;800&family=PT+Sans:wght@400;700&family=Roboto+Mono:wght@100;200;300;400;500;600;700&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap");
      * {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Roboto mono", "PT Sans", "IBM Plex Sans JP", sans-serif;
        background-color: #111;
        color: #fff;
        line-height: 1.5;
        font-size: 16px;
      }
      a {
        color: inherit;
      }
      .main {
        padding: 40px 10px;
        max-width: 600px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 30px;
      }
      .userabout > h1 {
        font-size: 40px;
      }
      .section > h2 {
        padding-bottom: 10px;
      }
      .contacts {
        display: inline-grid;
        grid-template-columns: 24px auto;
        line-height: 1;
        vertical-align: middle;
        gap: 10px 5px;
      }
      .contacts-item {
        display: contents;
      }
      .contacts-item__logo {
        display: inline-block;
        width: 20px;
        height: 20px;
        color: #888;
      }
      .contacts-item__logo svg {
        width: 100%;
        height: 100%;
      }
      .contacts-item__value {
        display: flex;
        align-items: center;
      }
    </style>
  </head>
